# 工作流的名称
name: Sync Fork with Upstream

# 工作流的触发条件
on:
  # 1. 允许您在 GitHub Actions 页面手动触发此工作流
  workflow_dispatch:

  # 2. 定时任务：使用 cron 语法，这里设置为每小时执行一次
  # 如果不需要定时同步，可以注释掉下面这行
  schedule:
    - cron: '0 4 * * *'

# 定义一个或多个作业
jobs:
  # 作业的唯一ID
  sync:
    # 作业运行的环境
    runs-on: ubuntu-latest

    # 作业的步骤
    steps:
      # 第一步：检出（Checkout）你的仓库代码
      # 这是必须的，以便后续步骤可以操作你的仓库
      - name: Checkout local repository
        uses: actions/checkout@v4
        with:
          # 获取所有历史记录，这对于某些合并策略是必要的
          fetch-depth: 0

      # 第二步：执行同步操作
      # 使用了您指定的 action，并修正了所有参数
      - name: Checkout local repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0
      
      - name: Sync from upstream but keep local workflows
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action[bot]"
      
          git remote add upstream https://github.com/privacy-protection-tools/anti-AD.git
          git fetch upstream
      
          git checkout master
          git merge upstream/master --no-edit || true
      
          git restore --source=HEAD --staged --worktree .github/workflows || true
      
      - name: Commit and push
        run: |
          git add .
          git diff --cached --quiet || git commit -m "Sync fork with upstream"
          git push origin master
              
