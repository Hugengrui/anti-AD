name: Sync Fork with Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action[bot]"

      - name: Add upstream repository
        run: |
          git remote add upstream https://github.com/privacy-protection-tools/anti-AD.git
          git fetch upstream

      - name: Sync master but keep local workflows
        run: |
          git checkout master
          git merge upstream/master --no-edit || true

          git restore --source=HEAD --staged --worktree .github/workflows || true

      - name: Commit if needed
        run: |
          git add .
          git diff --cached --quiet || git commit -m "Sync fork with upstream"

      - name: Push changes
        run: |
          git push origin master
